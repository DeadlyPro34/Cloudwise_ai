version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cloudwise-postgres
    environment:
      POSTGRES_USER: cloudwise_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cloudwise_password}
      POSTGRES_DB: cloudwise_user
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudwise_user -d cloudwise_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudwise-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cloudwise-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudwise-network

  # LocalStack (Mock AWS Ecosystem)
  localstack:
    image: localstack/localstack:3.4.0
    container_name: cloudwise-localstack
    ports:
      - "4566:4566"
    environment:
      - DEBUG=1
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/localstack/init:/etc/localstack/init/ready.d
    networks:
      - cloudwise-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudwise-backend
    environment:
      # Phase 1
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: postgresql://cloudwise_user:${DB_PASSWORD:-cloudwise_password}@postgres:5432/cloudwise_user
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      
      # Phase 2
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOCALSTACK_URL: http://localstack:4566
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_started
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/app:/app/app
    networks:
      - cloudwise-network
    restart: unless-stopped

  # Frontend (Vite Dev Server)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudwise-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "5173:80"
    volumes:
      - ./frontend/src:/app/src
    networks:
      - cloudwise-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  localstack_data:
    driver: local

networks:
  cloudwise-network:
    driver: bridge
